name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check . --line-length 140 --target-version py310 --ignore E402

      - name: Verify entrypoint help
        run: python scripts/verify_entrypoints_help.py

      - name: Smoke check
        run: python run_smoke.py

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py"
