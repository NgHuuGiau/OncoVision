name: Test Python Compatibility
true:
  push:
    branches:
    - main
    - develop
  pull_request:
    branches:
    - main
    - develop
  workflow_dispatch: null
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: CI (${{ matrix.os }} / Python 3.10)
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - ubuntu-26.04
        - ubuntu-22.04
        - ubuntu-20.04
        - macos-latest
        - windows-latest
        timeout:
        - 25
        - 25
        - 25
        - 25
        - 35
        - 45
    env:
      PYTHONIOENCODING: utf-8
      PYTHONDONTWRITEBYTECODE: '1'
      QT_QPA_PLATFORM: offscreen
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: pip
        cache-dependency-path: requirements.txt
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: "sudo apt-get update -qq\nsudo apt-get install -y --no-install-recommends\
        \ \\\n  libxkbcommon-x11-0 \\\n  libxcb-xinerama0 \\\n  libxkbcommon0 \\\n\
        \  libx11-xcb1 \\\n  libxcb-render0 \\\n  libxcb-shm0 \\\n  libxcb-image0\
        \ \\\n  libxcb-keysyms1 \\\n  libxcb-icccm4 \\\n  libxcb-sync1 \\\n  libxcb-xfixes0\
        \ \\\n  libxcb-shape0 \\\n  libxcb-randr0 \\\n  libxcb-glib1 \\\n  libxcb-cursor0\
        \ \\\n  libxdamage1 \\\n  libxcomposite1 \\\n  libxcursor1 \\\n  libxrandr2\
        \ \\\n  libxss1 \\\n  libxtst6 \\\n  libnss3 \\\n  libasound2 \\\n  libxinerama1\
        \ \\\n  libdbus-1-3 \\\n  libfontconfig1 \\\n  libfreetype6 \\\n  libgl1 \\\
        \n  libglib2.0-0 \\\n  libsm6 \\\n  libice6 \\\n  libxext6 \\\n  libx11-6\n"
    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: 'brew install qt 2>&1 || true

        '
    - name: Create runtime dir (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: 'mkdir -p /tmp/runtime-root

        chmod 700 /tmp/runtime-root

        '
    - name: Create runtime dir (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: 'mkdir -p /tmp/runtime-root

        chmod 700 /tmp/runtime-root

        '
    - name: Prepare log folder (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: 'mkdir -p ci-logs

        echo "CI started on $RUNNER_OS" > ci-logs/00-start.txt

        '
    - name: Prepare log folder (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: 'New-Item -ItemType Directory -Force -Path ci-logs | Out-Null

        "CI started on $env:RUNNER_OS" | Set-Content -Path ci-logs/00-start.txt -Encoding
        utf8

        '
    - name: Install dependencies (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: "set +e\nstatus=0\n\npython -m pip install --upgrade pip setuptools wheel\
        \ --timeout 60 2>&1 | tee ci-logs/01-install-pip.txt\ncmd_status=${PIPESTATUS[0]}\n\
        if [ \"$cmd_status\" -ne 0 ] && [ \"$status\" -eq 0 ]; then status=$cmd_status;\
        \ fi\n\npython -c \"from pathlib import Path; lines = Path('requirements.txt').read_text(encoding='utf-8').splitlines();\
        \ Path('ci-logs/requirements-unix.txt').write_text('\\n'.join(line for line\
        \ in lines if not line.lstrip().startswith('pyaudio')) + '\\n', encoding='utf-8')\"\
        \npython -m pip install --prefer-binary --timeout 60 -r ci-logs/requirements-unix.txt\
        \ 2>&1 | tee ci-logs/02-install-requirements.txt\ncmd_status=${PIPESTATUS[0]}\n\
        if [ \"$cmd_status\" -ne 0 ] && [ \"$status\" -eq 0 ]; then status=$cmd_status;\
        \ fi\n\npython -m pip install coverage --timeout 60 2>&1 | tee ci-logs/02b-install-coverage.txt\n\
        cmd_status=${PIPESTATUS[0]}\nif [ \"$cmd_status\" -ne 0 ] && [ \"$status\"\
        \ -eq 0 ]; then status=$cmd_status; fi\n\nif [ \"$status\" -ne 0 ]; then\n\
        \  echo \"Dependency installation failed with status=$status\" | tee ci-logs/02c-install-error.txt\n\
        fi\nexit \"$status\"\n"
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: "$status = 0\n\npython -m pip install --upgrade pip setuptools wheel --timeout\
        \ 60 2>&1 | Tee-Object -FilePath ci-logs/01-install-pip.txt\nif ($LASTEXITCODE\
        \ -ne 0 -and $status -eq 0) { $status = $LASTEXITCODE }\n\npython -m pip install\
        \ --prefer-binary --timeout 60 -r requirements.txt 2>&1 | Tee-Object -FilePath\
        \ ci-logs/02-install-requirements.txt\nif ($LASTEXITCODE -ne 0 -and $status\
        \ -eq 0) { $status = $LASTEXITCODE }\n\npython -m pip install coverage --timeout\
        \ 60 2>&1 | Tee-Object -FilePath ci-logs/02b-install-coverage.txt\nif ($LASTEXITCODE\
        \ -ne 0 -and $status -eq 0) { $status = $LASTEXITCODE }\n\nif ($status -ne\
        \ 0) {\n  \"Dependency installation failed with status=$status\" | Tee-Object\
        \ -FilePath ci-logs/02c-install-error.txt\n}\nexit $status\n"
    - name: Compile Python sources (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: 'set +e

        python -m compileall . 2>&1 | tee ci-logs/03-compileall.txt

        exit ${PIPESTATUS[0]}

        '
    - name: Compile Python sources (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: 'python -m compileall . 2>&1 | Tee-Object -FilePath ci-logs/03-compileall.txt

        exit $LASTEXITCODE

        '
    - name: Lint with Ruff (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: 'set +e

        ruff check . --ignore E402 2>&1 | tee ci-logs/04-ruff.txt

        exit ${PIPESTATUS[0]}

        '
    - name: Lint with Ruff (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: 'ruff check . --ignore E402 2>&1 | Tee-Object -FilePath ci-logs/04-ruff.txt

        exit $LASTEXITCODE

        '
    - name: Type check with mypy (Unix)
      if: runner.os != 'Windows'
      continue-on-error: true
      shell: bash
      run: 'set +e

        mypy medical utils run_app.py run_chat.py run_doctor.py run_medical.py run_menu.py
        run_smoke.py run_tests.py run_train.py --exclude app/chat_ui --ignore-missing-imports
        2>&1 | tee ci-logs/05-mypy-type-check.txt

        exit ${PIPESTATUS[0]}

        '
    - name: Type check with mypy (Windows)
      if: runner.os == 'Windows'
      continue-on-error: true
      shell: pwsh
      run: 'mypy medical utils run_app.py run_chat.py run_doctor.py run_medical.py
        run_menu.py run_smoke.py run_tests.py run_train.py --exclude app/chat_ui --ignore-missing-imports
        2>&1 | Tee-Object -FilePath ci-logs/05-mypy-type-check.txt

        exit $LASTEXITCODE

        '
    - name: Smoke check (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: "set +e\nif [ -f run_smoke.py ]; then\n  python run_smoke.py --ci-safe\
        \ --stop-on-fail 2>&1 | tee ci-logs/07-smoke-check.txt\n  exit ${PIPESTATUS[0]}\n\
        else\n  echo \"Skipped: run_smoke.py not found\" | tee ci-logs/07-smoke-check.txt\n\
        \  exit 0\nfi\n"
    - name: Smoke check (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: "if (Test-Path \"run_smoke.py\") {\n  python run_smoke.py --ci-safe --stop-on-fail\
        \ 2>&1 | Tee-Object -FilePath ci-logs/07-smoke-check.txt\n  exit $LASTEXITCODE\n\
        } else {\n  \"Skipped: run_smoke.py not found\" | Tee-Object -FilePath ci-logs/07-smoke-check.txt\n\
        \  exit 0\n}\n"
    - name: Run unit tests (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: 'set +e


        coverage run --source=. -m unittest discover -s tests -p "test_*.py" -v 2>&1
        | tee ci-logs/08-unit-tests.txt

        test_status=${PIPESTATUS[0]}


        coverage report -m --fail-under=70 2>&1 | tee ci-logs/09-coverage-report.txt

        report_status=${PIPESTATUS[0]}


        coverage xml -o ci-logs/coverage.xml 2>&1 | tee -a ci-logs/09-coverage-report.txt

        xml_status=${PIPESTATUS[0]}


        coverage html -d ci-logs/coverage-html 2>&1 | tee -a ci-logs/09-coverage-report.txt

        html_status=${PIPESTATUS[0]}


        if [ "$test_status" -ne 0 ]; then exit "$test_status"; fi

        if [ "$report_status" -ne 0 ]; then exit "$report_status"; fi

        if [ "$xml_status" -ne 0 ]; then exit "$xml_status"; fi

        exit "$html_status"

        '
    - name: Run unit tests (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: 'python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | Tee-Object
        -FilePath ci-logs/08-unit-tests.txt

        exit $LASTEXITCODE

        '
    - name: Create CI summary (Unix)
      if: always() && runner.os != 'Windows'
      shell: bash
      run: 'mkdir -p ci-logs

        cat <<''EOF'' > ci-logs/00-ci-summary.md

        # CI Summary


        Neu co step mau do, mo truc tiep step do trong tab Actions de xem log day
        du.

        Ban sao log cung duoc upload thanh artifact ben duoi.

        EOF

        cat ci-logs/00-ci-summary.md

        cat ci-logs/00-ci-summary.md >> "$GITHUB_STEP_SUMMARY"

        '
    - name: Create CI summary (Windows)
      if: always() && runner.os == 'Windows'
      shell: pwsh
      run: 'New-Item -ItemType Directory -Force -Path ci-logs | Out-Null

        @"

        # Windows CI Summary


        Neu co step mau do, mo truc tiep step do trong tab Actions de xem log day
        du.

        Ban sao log cung duoc upload thanh artifact ben duoi.

        "@ | Set-Content -Path ci-logs/00-ci-summary.md -Encoding utf8

        Get-Content ci-logs/00-ci-summary.md

        Get-Content ci-logs/00-ci-summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY
        -Append -Encoding utf8

        '
    - name: Upload CI logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-logs-${{ matrix.os }}-${{ github.sha }}
        path: ci-logs
        retention-days: 7
        compression-level: 6
        if-no-files-found: warn
