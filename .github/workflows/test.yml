name: Test Python Compatibility

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: CI (Python 3.10)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Prepare log folder
        run: |
          mkdir -p ci-logs
          echo "CI started" > ci-logs/00-start.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 2>&1 | tee ci-logs/01-install-pip.txt
          pip install -r requirements.txt 2>&1 | tee ci-logs/02-install-requirements.txt
          pip install ruff mypy 2>&1 | tee ci-logs/03-install-tools.txt

      - name: Lint with Ruff
        run: |
          ruff check . --line-length 140 --target-version py310 2>&1 | tee ci-logs/04-ruff-lint.txt

      - name: Type check with mypy
        run: |
          mypy . 2>&1 | tee ci-logs/05-mypy-type-check.txt

      - name: Verify entrypoint help
        run: |
          if [ -f scripts/verify_entrypoints_help.py ]; then
            python scripts/verify_entrypoints_help.py 2>&1 | tee ci-logs/06-verify-entrypoints-help.txt
          else
            echo "Skipped: scripts/verify_entrypoints_help.py not found" | tee ci-logs/06-verify-entrypoints-help.txt
          fi

      - name: Smoke check
        run: |
          if [ -f run_smoke.py ]; then
            python run_smoke.py 2>&1 | tee ci-logs/07-smoke-check.txt
          else
            echo "Skipped: run_smoke.py not found" | tee ci-logs/07-smoke-check.txt
          fi

      - name: Run unit tests
        run: |
          python -m unittest discover -v 2>&1 | tee ci-logs/08-unit-tests.txt

      - name: Create CI summary
        if: always()
        run: |
          {
            echo "# CI Test Summary"
            echo ""
            echo "Xem lỗi trực tiếp ở step màu đỏ trong tab Actions. File log cũng được upload ở artifact bên dưới."
            echo ""
            echo "## Log files"
            ls -la ci-logs || true
          } > ci-logs/00-ci-summary.txt

          cat ci-logs/00-ci-summary.txt
          cat ci-logs/00-ci-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-logs-${{ github.sha }}
          path: ci-logs
          retention-days: 7
          if-no-files-found: warn
