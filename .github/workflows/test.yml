name: Test Python Compatibility

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: CI (${{ matrix.os }} / Python 3.10)
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            timeout: 20
          - os: windows-latest
            timeout: 45
    env:
      PYTHONIOENCODING: utf-8
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Prepare log folder (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ci-logs
          echo "CI started on $RUNNER_OS" > ci-logs/00-start.txt

      - name: Prepare log folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci-logs | Out-Null
          "CI started on $env:RUNNER_OS" | Set-Content -Path ci-logs/00-start.txt -Encoding utf8

      - name: Install dependencies (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          status=0

          python -m pip install --upgrade pip setuptools wheel 2>&1 | tee ci-logs/01-install-pip.txt
          cmd_status=${PIPESTATUS[0]}
          if [ "$cmd_status" -ne 0 ] && [ "$status" -eq 0 ]; then status=$cmd_status; fi

          python -c "from pathlib import Path; lines = Path('requirements.txt').read_text(encoding='utf-8').splitlines(); Path('ci-logs/requirements-linux.txt').write_text('\n'.join(line for line in lines if not line.lstrip().startswith('pyaudio')) + '\n', encoding='utf-8')"
          pip install --prefer-binary -r ci-logs/requirements-linux.txt 2>&1 | tee ci-logs/02-install-requirements.txt
          cmd_status=${PIPESTATUS[0]}
          if [ "$cmd_status" -ne 0 ] && [ "$status" -eq 0 ]; then status=$cmd_status; fi

          pip install coverage 2>&1 | tee ci-logs/02b-install-coverage.txt
          cmd_status=${PIPESTATUS[0]}
          if [ "$cmd_status" -ne 0 ] && [ "$status" -eq 0 ]; then status=$cmd_status; fi

          exit "$status"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $status = 0

          python -m pip install --upgrade pip setuptools wheel 2>&1 | Tee-Object -FilePath ci-logs/01-install-pip.txt
          if ($LASTEXITCODE -ne 0 -and $status -eq 0) { $status = $LASTEXITCODE }

          pip install --prefer-binary -r requirements.txt 2>&1 | Tee-Object -FilePath ci-logs/02-install-requirements.txt
          if ($LASTEXITCODE -ne 0 -and $status -eq 0) { $status = $LASTEXITCODE }

          exit $status

      - name: Compile Python sources (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          python -m compileall . 2>&1 | tee ci-logs/03-compileall.txt
          exit ${PIPESTATUS[0]}

      - name: Compile Python sources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m compileall . 2>&1 | Tee-Object -FilePath ci-logs/03-compileall.txt
          exit $LASTEXITCODE

      - name: Lint with Ruff (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          ruff check . --ignore E402 --exclude HieraChain 2>&1 | tee ci-logs/04-ruff.txt
          exit ${PIPESTATUS[0]}

      - name: Lint with Ruff (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ruff check . --ignore E402 --exclude HieraChain 2>&1 | Tee-Object -FilePath ci-logs/04-ruff.txt
          exit $LASTEXITCODE

      - name: Type check with mypy (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          mypy . 2>&1 | tee ci-logs/05-mypy-type-check.txt
          exit ${PIPESTATUS[0]}

      - name: Verify entrypoint help (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          if [ -f scripts/verify_entrypoints_help.py ]; then
            python scripts/verify_entrypoints_help.py 2>&1 | tee ci-logs/06-verify-entrypoints-help.txt
            exit ${PIPESTATUS[0]}
          else
            echo "Skipped: scripts/verify_entrypoints_help.py not found" | tee ci-logs/06-verify-entrypoints-help.txt
            exit 0
          fi

      - name: Verify entrypoint help (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "scripts/verify_entrypoints_help.py") {
            python scripts/verify_entrypoints_help.py 2>&1 | Tee-Object -FilePath ci-logs/06-verify-entrypoints-help.txt
            exit $LASTEXITCODE
          } else {
            "Skipped: scripts/verify_entrypoints_help.py not found" | Tee-Object -FilePath ci-logs/06-verify-entrypoints-help.txt
            exit 0
          }

      - name: Smoke check (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          if [ -f run_smoke.py ]; then
            python run_smoke.py --ci-safe --stop-on-fail 2>&1 | tee ci-logs/07-smoke-check.txt
            exit ${PIPESTATUS[0]}
          else
            echo "Skipped: run_smoke.py not found" | tee ci-logs/07-smoke-check.txt
            exit 0
          fi

      - name: Smoke check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "run_smoke.py") {
            python run_smoke.py --ci-safe --stop-on-fail 2>&1 | Tee-Object -FilePath ci-logs/07-smoke-check.txt
            exit $LASTEXITCODE
          } else {
            "Skipped: run_smoke.py not found" | Tee-Object -FilePath ci-logs/07-smoke-check.txt
            exit 0
          }

      - name: Run unit tests (Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e

          coverage run --source=. -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee ci-logs/08-unit-tests.txt
          test_status=${PIPESTATUS[0]}

          coverage report -m 2>&1 | tee ci-logs/09-coverage-report.txt
          report_status=${PIPESTATUS[0]}

          coverage xml -o ci-logs/coverage.xml 2>&1 | tee -a ci-logs/09-coverage-report.txt
          xml_status=${PIPESTATUS[0]}

          coverage html -d ci-logs/coverage-html 2>&1 | tee -a ci-logs/09-coverage-report.txt
          html_status=${PIPESTATUS[0]}

          if [ "$test_status" -ne 0 ]; then exit "$test_status"; fi
          if [ "$report_status" -ne 0 ]; then exit "$report_status"; fi
          if [ "$xml_status" -ne 0 ]; then exit "$xml_status"; fi
          exit "$html_status"

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | Tee-Object -FilePath ci-logs/08-unit-tests.txt
          exit $LASTEXITCODE

      - name: Create CI summary (Linux)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ci-logs
          cat <<'EOF' > ci-logs/00-ci-summary.md
          # CI Test Summary

          Neu co step mau do, mo truc tiep step do trong tab Actions de xem log day du.
          Ban sao log cung duoc upload thanh artifact ben duoi.
          EOF
          cat ci-logs/00-ci-summary.md
          cat ci-logs/00-ci-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create CI summary (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci-logs | Out-Null
          @"
          # Windows CI Summary

          Neu co step mau do, mo truc tiep step do trong tab Actions de xem log day du.
          Ban sao log cung duoc upload thanh artifact ben duoi.
          "@ | Set-Content -Path ci-logs/00-ci-summary.md -Encoding utf8
          Get-Content ci-logs/00-ci-summary.md
          Get-Content ci-logs/00-ci-summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ matrix.os }}-${{ github.sha }}
          path: ci-logs
          retention-days: 7
          if-no-files-found: warn
