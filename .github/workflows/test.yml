name: Test Python Compatibility

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: CI (Python 3.10)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Prepare log folder
        run: |
          mkdir -p ci-logs
          echo "CI started" > ci-logs/00-start.txt

      - name: Install dependencies
        run: |
          set +e
          {
            echo "Installing Python dependencies..."
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install ruff mypy
          } > ci-logs/01-install-dependencies.txt 2>&1
          status=$?
          echo "$status" > ci-logs/01-install-dependencies.exitcode
          if [ "$status" -ne 0 ]; then touch ci-logs/01-install-dependencies.failed; fi
          exit 0

      - name: Lint with Ruff
        run: |
          set +e
          ruff check . --line-length 140 --target-version py310 > ci-logs/02-ruff-lint.txt 2>&1
          status=$?
          echo "$status" > ci-logs/02-ruff-lint.exitcode
          if [ "$status" -ne 0 ]; then touch ci-logs/02-ruff-lint.failed; fi
          exit 0

      - name: Type check with mypy
        run: |
          set +e
          mypy . > ci-logs/03-mypy-type-check.txt 2>&1
          status=$?
          echo "$status" > ci-logs/03-mypy-type-check.exitcode
          if [ "$status" -ne 0 ]; then touch ci-logs/03-mypy-type-check.failed; fi
          exit 0

      - name: Verify entrypoint help
        run: |
          set +e
          if [ -f scripts/verify_entrypoints_help.py ]; then
            python scripts/verify_entrypoints_help.py > ci-logs/04-verify-entrypoints-help.txt 2>&1
          else
            echo "Skipped: scripts/verify_entrypoints_help.py not found" > ci-logs/04-verify-entrypoints-help.txt
          fi
          status=$?
          echo "$status" > ci-logs/04-verify-entrypoints-help.exitcode
          if [ "$status" -ne 0 ]; then touch ci-logs/04-verify-entrypoints-help.failed; fi
          exit 0

      - name: Smoke check
        run: |
          set +e
          if [ -f run_smoke.py ]; then
            python run_smoke.py > ci-logs/05-smoke-check.txt 2>&1
          else
            echo "Skipped: run_smoke.py not found" > ci-logs/05-smoke-check.txt
          fi
          status=$?
          echo "$status" > ci-logs/05-smoke-check.exitcode
          if [ "$status" -ne 0 ]; then touch ci-logs/05-smoke-check.failed; fi
          exit 0

      - name: Run unit tests
        run: |
          set +e
          python -m unittest discover -v > ci-logs/06-unit-tests.txt 2>&1
          status=$?
          echo "$status" > ci-logs/06-unit-tests.exitcode
          if [ "$status" -ne 0 ]; then touch ci-logs/06-unit-tests.failed; fi
          exit 0

      - name: Create CI summary
        if: always()
        run: |
          {
            echo "# CI Test Summary"
            echo ""
            echo "| Step | Log file | Result |"
            echo "|---|---|---|"
            for log in ci-logs/*.txt; do
              base=$(basename "$log" .txt)
              if [ -f "ci-logs/$base.failed" ]; then
                result="FAILED"
              elif [ -f "ci-logs/$base.exitcode" ] || [ "$base" = "00-start" ]; then
                result="PASSED"
              else
                result="CREATED"
              fi
              echo "| $base | $(basename "$log") | $result |"
            done
          } > ci-logs/00-ci-summary.txt

          cat ci-logs/00-ci-summary.txt
          cat ci-logs/00-ci-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-logs-${{ github.sha }}
          path: ci-logs
          retention-days: 7
          if-no-files-found: error

      - name: Fail workflow if any check failed
        if: always()
        run: |
          if ls ci-logs/*.failed >/dev/null 2>&1; then
            echo "One or more CI checks failed. Download artifact 'ci-test-logs-${{ github.sha }}' to view .txt logs."
            exit 1
          fi
          echo "All CI checks passed."
