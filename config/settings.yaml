system:
  auto_detect_hardware: true
  prefer_gpu: true

user_mode:
  options:
    - auto
    - high
    - medium
    - low
  default: auto

models:
  high:
    model: yolo11x.pt
    device: gpu
    imgsz: 960
  medium:
    model: yolo11s.pt
    device: gpu
    imgsz: 640
  low:
    model: yolo11n.pt
    device: auto
    imgsz: 320
  fallback_gpu_1:
    model: yolo11m.pt
    device: gpu
    imgsz: 768
  fallback_gpu_2:
    model: yolo11s.pt
    device: gpu
    imgsz: 512
  fallback_cpu:
    model: yolo11s.pt
    device: cpu
    imgsz: 416
  fallback_cpu_weak:
    model: yolo11n.pt
    device: cpu
    imgsz: 320

auto_profiles:
  gpu_high_end:
    min_vram_gb: 12
    profile: high
  gpu_balanced:
    min_vram_gb: 4
    profile: medium
  gpu_entry:
    min_vram_gb: 2
    profile: low
  cpu_balanced:
    min_ram_gb: 16
    profile: low
  cpu_safe:
    min_ram_gb: 8
    profile: fallback_cpu
  cpu_minimum:
    min_ram_gb: 0
    profile: fallback_cpu_weak

experimental:
  try_higher_model:
    enabled: false
    model: yolo11m.pt
    imgsz: 416

stable_backup:
  gpu_model: yolo11m.pt
  cpu_model: yolo11n.pt

camera:
  width: 800
  height: 500
  font_size: 18
  box_thickness: 2
  label_font_scale: 0.8
  show_fps: true

output:
  captures_dir: output/captures
  recordings_dir: output/recordings

recording:
  codec: mp4v
  fps: 20

display_camera:
  width: 800
  height: 600
  font_size: 26
  box_thickness: 4
  label_font_scale: 1.2

inference:
  confidence: 0.35
  iou: 0.45
  display_confidence: 0.55
  person_confidence: 0.65
  phone_confidence: 0.60
  enhance_low_light: true
  low_light_mean_threshold: 72
  max_det: 60
  use_half_for_cuda: true
